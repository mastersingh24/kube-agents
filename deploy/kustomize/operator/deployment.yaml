apiVersion: v1
kind: ServiceAccount
metadata:
  name: <OPERATOR_AGENT_NAME>-sa
  namespace: agent-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: <OPERATOR_AGENT_NAME>-config
  namespace: agent-system
data:
  SETTINGS.md: |
    # GKE Scope Configuration
    - **Cluster Name:** <CLUSTER_NAME>
    - **Cluster Location:** <CLUSTER_LOCATION>
    - **Git Repo:** <GIT_REPO>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: <OPERATOR_AGENT_NAME>-pvc
  namespace: agent-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: <OPERATOR_AGENT_NAME>-fluent-bit-config
  namespace: agent-system
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name              tail
        Tag               agent.logs
        Path              /opt/data/logs/*.log
        DB                /fluent-bit/state/fluent-bit.db
        Refresh_Interval  5
        Rotate_Wait       30
        Mem_Buf_Limit     20MB
        Skip_Long_Lines   On
        Read_from_Head    On
        Path_Key          file_path

    [FILTER]
        Name              record_modifier
        Match             agent.logs
        Record            app agent
        Record            log_source agent-file

    [OUTPUT]
        Name              stdout
        Match             agent.logs
        Format            json_lines
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <OPERATOR_AGENT_NAME>
  namespace: agent-system
  labels:
    app: <OPERATOR_AGENT_NAME>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <OPERATOR_AGENT_NAME>
  template:
    metadata:
      labels:
        app: <OPERATOR_AGENT_NAME>
    spec:
      runtimeClassName: gvisor
      serviceAccountName: <OPERATOR_AGENT_NAME>-sa
      containers:
        - name: <OPERATOR_AGENT_NAME>
          image: <REPO>/operator-agent:latest
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          env:
            - name: OTEL_SERVICE_NAME
              value: "<OPERATOR_AGENT_NAME>"
            - name: AGENT_BROWSER_ARGS
              value: "<AGENT_BROWSER_ARGS>"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-agent-secrets
                  key: api-server-key
            - name: MODEL_NAME
              value: "model-default"
            - name: MODEL_BASE_URL
              value: "http://litellm.agent-system.svc.cluster.local/v1"
            - name: MODEL_API_KEY
              value: "none"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/data
            - name: config-volume
              mountPath: /opt/data/SETTINGS.md
              subPath: SETTINGS.md
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.7
          args:
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          resources:
            requests:
              cpu: 100m
              ephemeral-storage: 1Gi
              memory: 128Mi
            limits:
              cpu: 500m
              ephemeral-storage: 1Gi
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data
              name: data-volume
              readOnly: true
            - mountPath: /fluent-bit/etc/fluent-bit.conf
              name: fluent-bit-config
              subPath: fluent-bit.conf
              readOnly: true
            - mountPath: /fluent-bit/state
              name: fluent-bit-state
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: <OPERATOR_AGENT_NAME>-pvc
        - name: config-volume
          configMap:
            name: <OPERATOR_AGENT_NAME>-config
        - name: fluent-bit-config
          configMap:
            defaultMode: 420
            name: <OPERATOR_AGENT_NAME>-fluent-bit-config
        - name: fluent-bit-state
          emptyDir: {}
---
# --- Strict Read-Only Cluster Permissions ---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: <OPERATOR_AGENT_NAME>-cluster-role
rules:
  - apiGroups: [""]
    resources:
      [
        "nodes",
        "namespaces",
        "pods",
        "services",
        "events",
        "persistentvolumes",
        "serviceaccounts",
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: <OPERATOR_AGENT_NAME>-cluster-role-binding
subjects:
  - kind: ServiceAccount
    name: <OPERATOR_AGENT_NAME>-sa
    namespace: agent-system
roleRef:
  kind: ClusterRole
  name: <OPERATOR_AGENT_NAME>-cluster-role
  apiGroup: rbac.authorization.k8s.io
