---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - persistentvolumeclaims
      - serviceaccounts
      - services
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - iam.cnrm.cloud.google.com
    resources:
      - iampolicymembers
      - iamserviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kubeagents.x-k8s.io
    resources:
      - devteamagents
      - operatoragents
      - platformagents
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - kubeagents.x-k8s.io
    resources:
      - devteamagents/finalizers
      - operatoragents/finalizers
      - platformagents/finalizers
    verbs:
      - update
  - apiGroups:
      - kubeagents.x-k8s.io
    resources:
      - devteamagents/status
      - operatoragents/status
      - platformagents/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - pubsub.cnrm.cloud.google.com
    resources:
      - pubsubsubscriptions
      - pubsubtopics
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
      - clusterroles
    verbs:
      - bind
      - create
      - delete
      - escalate
      - get
      - list
      - patch
      - update
      - watch
